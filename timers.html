<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bailiff - Timer View</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Playfair+Display:wght@600;700;800&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="timers.css">
</head>
<body>

    <div class="courtroom">
        <div class="bench-header">
            <div class="bench-header-left">
                <div class="bench-party-info">
                    <div class="bench-party-label">Plaintiff / Prosecution</div>
                    <div class="bench-party-name" id="left-team-name">Plaintiff</div>
                </div>
            </div>
            <div class="bench-header-center">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M7 20l10 0"/><path d="M6 6l6 -1l6 1"/><path d="M12 3l0 17"/><path d="M9 12l-3 -6l-3 6a3 3 0 0 0 6 0"/><path d="M21 12l-3 -6l-3 6a3 3 0 0 0 6 0"/>
                </svg>
                <span>Bailiff</span>
            </div>
            <div class="bench-header-right">
                <div class="bench-party-info">
                    <div class="bench-party-label">Defense</div>
                    <div class="bench-party-name" id="right-team-name">Defense</div>
                </div>
            </div>
        </div>

        <div class="courtroom-body">
            <div class="counsel left">
                <div class="counsel-label">Plaintiff / Prosecution</div>
                <div class="counsel-widgets" id="left-widgets"></div>
            </div>

            <div class="bench">
                <div class="bench-scales">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M7 20l10 0"/><path d="M6 6l6 -1l6 1"/><path d="M12 3l0 17"/><path d="M9 12l-3 -6l-3 6a3 3 0 0 0 6 0"/><path d="M21 12l-3 -6l-3 6a3 3 0 0 0 6 0"/>
                    </svg>
                </div>
                <div class="current-block-name" id="current-block-name">Opening Statement</div>
                <div class="countdown" id="countdown">05:00</div>
                <div class="time-label" id="time-label">Time Remaining</div>
                <div class="secondary-timer" id="secondary-timer">05:00</div>

                <div class="bench-controls" id="timer-controls">
                    <div class="bench-main-controls">
                        <button class="bench-btn bench-btn-primary" id="start-btn">Start</button>
                        <button class="bench-btn bench-btn-danger" id="stop-btn" style="display: none;">Stop</button>
                        <button class="bench-btn bench-btn-secondary" id="next-btn" style="display: none;">Next Block</button>
                    </div>

                    <div class="bench-quick-row">
                        <button class="quick-btn quick-sub" id="sub-30-btn">-30s</button>
                        <button class="quick-btn quick-sub" id="sub-15-btn">-15s</button>
                        <button class="quick-btn quick-neutral" id="reset-btn">Reset</button>
                        <button class="quick-btn quick-add" id="add-15-btn">+15s</button>
                        <button class="quick-btn quick-add" id="add-30-btn">+30s</button>
                    </div>

                    <div class="bench-custom-row">
                        <button class="mini-btn" id="clear-custom-btn">Clear</button>
                        <input type="text" class="bench-time-input" id="custom-time-input" placeholder="00:00">
                        <button class="mini-btn mini-add" id="add-custom-btn">Add</button>
                        <button class="mini-btn" id="set-custom-btn">Set</button>
                        <button class="mini-btn mini-sub" id="sub-custom-btn">Sub</button>
                    </div>

                    <a class="bench-lobby-link" href="index.html">← Return to Lobby</a>
                </div>
            </div>

            <div class="counsel right">
                <div class="counsel-label">Defense</div>
                <div class="counsel-widgets" id="right-widgets"></div>
            </div>
        </div>
    </div>

    <div class="confirm-overlay hidden" id="confirm-overlay">
        <div class="confirm-dialog preset-dialog">
            <div class="confirm-seal">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M7 20l10 0"/><path d="M6 6l6 -1l6 1"/><path d="M12 3l0 17"/><path d="M9 12l-3 -6l-3 6a3 3 0 0 0 6 0"/><path d="M21 12l-3 -6l-3 6a3 3 0 0 0 6 0"/>
                </svg>
            </div>
            <h3>End Current Trial?</h3>
            <p>Trials are auto-saved periodically. Save now to keep this session and resume later.</p>
            <div class="save-desc-field">
                <label>
                    <span>Notes (optional)</span>
                    <textarea id="save-desc-input" rows="2" placeholder="e.g. Round 2, Courtroom 5"></textarea>
                </label>
            </div>
            <div class="confirm-actions">
                <button class="confirm-btn confirm-cancel" id="confirm-cancel">Cancel</button>
                <button class="confirm-btn confirm-save" id="confirm-save-exit">Save & Exit</button>
            </div>
        </div>
    </div>

    <script src="timers.js"></script>
</body>
</html>
